<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Position Size Calculator</title>
<style>
  :root {
    --bg: #1a1d24;
    --surface: #22262f;
    --surface2: #2a2f3b;
    --border: #3a3f4e;
    --text: #e8eaf0;
    --muted: #8890a4;
    --accent: #4a9eff;
    --accent2: #2d7dd6;
    --green: #2ecc71;
    --yellow: #ffee00;
    --yellow-bg: #1f1d00;
    --yellow-border: #8a7d00;
    --cyan: #00f0ff;
    --cyan-bg: #001a1f;
    --cyan-border: #006070;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px;
  }
  .app { width: 100%; max-width: 700px; }
  .header-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 6px; }
  h2 { font-size: 26px; font-weight: 700; margin-bottom: 24px; }
  .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .preset-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; font-weight: 600; padding: 9px 18px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pair-select-wrap { flex: 1; min-width: 140px; }
  .pair-select-wrap select { width: 100%; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 6px; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-edit { background: #2a2600; color: var(--yellow); border: 1px solid #6a5e00; }
  .badge-auto { background: #001a1f; color: var(--cyan); border: 1px solid var(--cyan-border); }
  input, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 16px; font-family: var(--font); padding: 10px 14px;
    width: 100%; outline: none; transition: border-color 0.2s, background 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  input.editable { background: var(--yellow-bg); border-color: var(--yellow-border); color: var(--yellow); text-shadow: 0 0 8px rgba(255,238,0,0.4); }
  input.editable:focus { border-color: var(--yellow); background: #252200; }
  input.editable::placeholder { color: #6a5e00; }
  input.locked { background: var(--cyan-bg); border: 1px solid var(--cyan-border); color: var(--cyan); cursor: not-allowed; font-size: 14px; text-shadow: 0 0 8px rgba(0,240,255,0.3); }
  .price-wrap { position: relative; }
  .price-wrap input { padding-right: 36px; }
  .live-dot { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: #444; transition: background 0.3s; }
  .live-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .live-dot.error { background: #e05a5a; }
  .live-dot.loading { background: var(--yellow); animation: blink 0.7s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .price-status { font-size: 11px; color: var(--muted); margin-top: 4px; min-height: 15px; }
  .risk-row { display: flex; gap: 8px; }
  .risk-row input { flex: 1; }
  .risk-row select { width: 90px; flex-shrink: 0; }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  /* TradingView widget container */
  .tv-widget-wrap {
    margin-bottom: 18px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    height: 80px;
    display: none;
  }
  .tv-widget-wrap.visible { display: block; }
  .tv-widget-wrap iframe { display: block; }

  button.calc-btn {
    width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px;
    transition: background 0.2s, transform 0.1s; letter-spacing: 0.5px;
  }
  button.calc-btn:hover { background: var(--accent2); }
  button.calc-btn:active { transform: scale(0.98); }
  button.calc-btn:disabled { background: #2a3040; color: var(--muted); cursor: not-allowed; }
  .results { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 20px; display: none; }
  .results.visible { display: block; }
  .results-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 16px; }
  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .result-card { background: var(--surface2); border-radius: 8px; padding: 14px; text-align: center; }
  .result-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .result-value { font-size: 22px; font-weight: 700; }
  .rv-blue { color: var(--accent); }
  .rv-yellow { color: var(--yellow); }
  .rv-green { color: var(--green); }
  .formula-note { font-size: 12px; color: var(--muted); margin-top: 16px; line-height: 1.9; border-top: 1px solid var(--border); padding-top: 14px; }
  .formula-note b { color: var(--text); }
  .formula-note span { color: var(--text); font-weight: 600; }
  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

  'GBPCHF': { display:'GBP/CHF', pip:0.0001, jpy:false, base:'GBP', quote:'CHF', conv:'need_eurchf' },
  'GBPAUD': { display:'GBP/AUD', pip:0.0001, jpy:false, base:'GBP', quote:'AUD', conv:'need_euraud' },
  'GBPCAD': { display:'GBP/CAD', pip:0.0001, jpy:false, base:'GBP', quote:'CAD', conv:'need_eurcad' },
  'CADJPY': { display:'CAD/JPY', pip:0.01,   jpy:true,  base:'CAD', quote:'JPY', conv:'need_eurjpy' },
  'CHFJPY': { display:'CHF/JPY', pip:0.01,   jpy:true,  base:'CHF', quote:'JPY', conv:'need_eurjpy' },
  'NZDJPY': { display:'NZD/JPY', pip:0.01,   jpy:true,  base:'NZD', quote:'JPY', conv:'need_eurjpy' },
  'AUDCAD': { display:'AUD/CAD', pip:0.0001, jpy:false, base:'AUD', quote:'CAD', conv:'need_eurcad' },
  'AUDCHF': { display:'AUD/CHF', pip:0.0001, jpy:false, base:'AUD', quote:'CHF', conv:'need_eurchf' },
};

let currentPair = 'EURUSD';

// ─── TradingView widget ────────────────────────────────────────────────────
function loadTVWidget(symbol) {
  const container = document.getElementById('tvWidget');
  container.innerHTML = '';
  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
  script.async = true;
  script.innerHTML = JSON.stringify({
    symbol: symbol,
    width: '100%',
    isTransparent: true,
    colorTheme: 'dark',
    locale: 'it'
  });
  container.appendChild(script);
}

// ─── TwelveData live price ────────────────────────────────────────────────
const priceCache = {};

async function fetchLivePrice(symbol) {
  if (priceCache[symbol] && (Date.now() - priceCache[symbol].ts < 10000)) {
    return priceCache[symbol].price;
  }
  const dot = document.getElementById('liveDot');
  const status = document.getElementById('priceStatus');
  dot.className = 'live-dot loading';
  status.textContent = 'Recupero prezzo live…';
  try {
    const url = `${WORKER_URL}?symbol=${symbol}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.status === 'error' || !d.price) throw new Error(d.message || 'No price');
    const price = parseFloat(d.price);
    priceCache[symbol] = { price, ts: Date.now() };
    dot.className = 'live-dot live';
    const t = new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    status.textContent = `Live TwelveData · ${t}`;
    return price;
  } catch(e) {
    dot.className = 'live-dot error';
    status.textContent = 'Live non disponibile — inserisci il prezzo manualmente';
    return null;
  }
}

// EUR/quote rate cache per pip value conversion
const rateCache = {};
async function fetchEurRate(quoteCcy) {
  const key = 'EUR' + quoteCcy;
  if (rateCache[key] && (Date.now() - rateCache[key].ts < 30000)) return rateCache[key].rate;
  try {
    const url = `${WORKER_URL}?symbol=EUR/${quoteCcy}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.status === 'error' || !d.price) throw new Error();
    const rate = parseFloat(d.price);
    rateCache[key] = { rate, ts: Date.now() };
    return rate;
  } catch {
    const fallbacks = { USD:1.08, JPY:160, GBP:0.86, CHF:0.93, CAD:1.47, AUD:1.65, NZD:1.78 };
    return fallbacks[quoteCcy] || null;
  }
}

// ─── Pair selection ────────────────────────────────────────────────────────
function selectPair(key, btn) {
  currentPair = key;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('pairDropdown').value = '';
  document.getElementById('price').value = '';
  document.getElementById('priceStatus').textContent = 'Prezzo aggiornato automaticamente al calcolo';
  document.getElementById('liveDot').className = 'live-dot';
  updatePipDisplay();
  loadTVWidget('FX:' + key);
}

function selectPairFromDropdown(sel) {
  if (!sel.value) return;
  currentPair = sel.value;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('price').value = '';
  document.getElementById('priceStatus').textContent = 'Prezzo aggiornato automaticamente al calcolo';
  document.getElementById('liveDot').className = 'live-dot';
  updatePipDisplay();
  loadTVWidget('FX:' + sel.value);
}

function updatePipDisplay() {
  const c = CFG[currentPair];
  document.getElementById('pipSizeDisplay').value = c
    ? (c.jpy ? '0.01  (coppia JPY)' : '0.0001')
    : '0.0001';
}

// ─── Pip value in EUR ──────────────────────────────────────────────────────
// pip_value_EUR = (pip × 100.000) / EUR_QUOTE
// Se base=EUR → EUR_QUOTE = prezzo della coppia
// Esempio EUR/USD @ 1.17388: (0.0001 × 100000) / 1.17388 = €8.519/lotto ✓
async function getPipValueEur(c, price) {
  const pipValueQuote = c.pip * 100000;
  if (c.conv === 'base_is_eur') return pipValueQuote / price;
  if (c.conv === 'quote_is_eur') return pipValueQuote;
  const eurQuote = await fetchEurRate(c.quote);
  return pipValueQuote / (eurQuote || price);
}

// ─── Calculate ─────────────────────────────────────────────────────────────
async function calculate() {
  const btn = document.getElementById('calcBtn');
  btn.disabled = true;
  btn.textContent = 'Calcolo in corso…';

  const c = CFG[currentPair];
  const stopPips = parseFloat(document.getElementById('stopLoss').value);
  const balance  = parseFloat(document.getElementById('balance').value);
  const riskVal  = parseFloat(document.getElementById('risk').value);
  const riskType = document.getElementById('riskType').value;

  if ([stopPips, balance, riskVal].some(v => isNaN(v) || v <= 0)) {
    alert('Verifica i campi evidenziati in giallo.');
    btn.disabled = false; btn.textContent = 'Calcola Position Size'; return;
  }

  // Prova prima valore manuale, poi live
  const priceRaw = document.getElementById('price').value.replace(/,/g, '.').trim();
  let price = parseFloat(priceRaw);

  if (isNaN(price) || price <= 0) {
    // Fetch live da TwelveData
    const symbol = c.base + '/' + c.quote;
    const live = await fetchLivePrice(symbol);
    if (!live) {
      alert('Prezzo non disponibile. Inseriscilo manualmente nel campo giallo.');
      btn.disabled = false; btn.textContent = 'Calcola Position Size'; return;
    }
    price = live;
    const dec = c.jpy ? 3 : 5;
    document.getElementById('price').value = price.toFixed(dec);
  } else {
    document.getElementById('liveDot').className = 'live-dot live';
    document.getElementById('priceStatus').textContent = 'Prezzo inserito manualmente';
  }

  const riskEur = riskType === 'pct' ? balance * riskVal / 100 : riskVal;
  const pipValueEur = await getPipValueEur(c, price);
  const lots  = riskEur / (stopPips * pipValueEur);
  const units = lots * 100000;

  document.getElementById('res-lots').textContent  = lots.toFixed(2);
  document.getElementById('res-units').textContent = Math.round(units).toLocaleString('it-IT');
  document.getElementById('res-risk').textContent  = '€\u00a0' + riskEur.toFixed(2);

  const dec = c.jpy ? 3 : 5;
  const riskDesc = riskType === 'pct'
    ? `${riskVal}% di €\u00a0${balance.toLocaleString('it-IT')}`
    : `€\u00a0${riskVal} fissi`;

  document.getElementById('res-formula').innerHTML =
    `<b>Coppia:</b> <span>${c.display}</span> &nbsp;·&nbsp; ` +
    `<b>Prezzo:</b> <span>${price.toFixed(dec)}</span> &nbsp;·&nbsp; ` +
    `<b>Pip:</b> <span>${c.pip}</span><br>` +
    `<b>Pip value/lotto:</b> (${c.pip} × 100.000) ÷ ${price.toFixed(dec)} = <span>€ ${pipValueEur.toFixed(5)}</span><br><br>` +
    `<b>Lotti:</b> € ${riskEur.toFixed(2)} ÷ (${stopPips} × € ${pipValueEur.toFixed(5)}) = <span>${lots.toFixed(4)} lotti</span><br>` +
    `Rischio: <span>${riskDesc}</span> &nbsp;·&nbsp; Contratto: <span>100.000 unità</span>`;

  document.getElementById('results').classList.add('visible');
  btn.disabled = false;
  btn.textContent = 'Calcola Position Size';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

// Init
updatePipDisplay();
loadTVWidget('FX:EURUSD');
</script>
